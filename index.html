<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- ПРОВЕРЬ ЭТУ СТРОКУ, ОНА ДОЛЖНА БЫТЬ ТАКОЙ: -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f1115; color: white; margin: 0; padding: 15px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-bottom: 180px; }
        .card { background: #1e1e1e; border: 1px solid #333; border-radius: 12px; padding: 15px; cursor: pointer; }
        .card.active { border-color: #f39c12; background: rgba(243, 156, 18, 0.1); }
        .card b { display: block; font-size: 16px; margin-bottom: 5px; }
        .card span { color: #f39c12; font-weight: bold; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: #16191f; padding: 20px; border-top: 1px solid #333; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; margin-bottom: 10px; box-sizing: border-box; text-align: center; font-size: 16px; }
        button { width: 100%; padding: 16px; border-radius: 10px; border: none; background: #f39c12; color: #000; font-weight: bold; opacity: 0.3; }
    </style>
</head>
<body>
    <h2 style="color: #f39c12;">PUBG SHOP</h2>
    <div class="grid">
        <div class="card" onclick="select(this, '60', 90)"><b>💎 60 UC</b><span>90₽</span></div>
        <div class="card" onclick="select(this, '120', 170)"><b>💎 120 UC</b><span>170₽</span></div>
        <div class="card" onclick="select(this, '325', 420)"><b>💎 325 UC</b><span>420₽</span></div>
        <div class="card" onclick="select(this, '660', 810)"><b>💎 660 UC</b><span>810₽</span></div>
        <div class="card" onclick="select(this, '1800', 2050)"><b>💎 1800 UC</b><span>2050₽</span></div>
        <div class="card" onclick="select(this, '8100', 7900)"><b>💎 8100 UC</b><span>7900₽</span></div>
    </div>
    <div class="footer">
        <input type="number" id="p_id" placeholder="Ваш Player ID">
        <button id="main_btn" disabled onclick="sendData()">ОФОРМИТЬ ЗАКАЗ</button>
    </div>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let selected = null;
        function select(el, uc, price) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            selected = { uc, price };
            validate();
        }
        function validate() {
            const btn = document.getElementById('main_btn');
            const input = document.getElementById('p_id');
            if (selected && input.value.length >= 5) {
                btn.disabled = false;
                btn.style.opacity = "1";
            } else {
                btn.disabled = true;
                btn.style.opacity = "0.3";
            }
        }
        document.getElementById('p_id').oninput = validate;
        function sendData() {
            const input = document.getElementById('p_id');
            tg.sendData(JSON.stringify({amount: selected.uc, price: selected.price, player_id: input.value}));
        }
    </script>
</body>
</html>
