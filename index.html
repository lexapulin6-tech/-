<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Подключаем скрипт Телеграм ПЕРВЫМ -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f1115; color: white; margin: 0; padding: 15px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-bottom: 180px; }
        .card { 
            background: #1e1e1e; border: 1px solid #333; 
            border-radius: 12px; padding: 15px; cursor: pointer; 
        }
        /* Стиль для ВЫБРАННОЙ карточки */
        .card.active { border-color: #f39c12; background: rgba(243, 156, 18, 0.2); box-shadow: 0 0 10px #f39c12; }
        .card b { display: block; font-size: 16px; margin-bottom: 5px; }
        .card span { color: #f39c12; font-weight: bold; }
        
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: #16191f; padding: 20px; border-top: 1px solid #333; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; margin-bottom: 10px; box-sizing: border-box; text-align: center; font-size: 16px; }
        button { width: 100%; padding: 16px; border-radius: 10px; border: none; background: #f39c12; color: #000; font-weight: bold; font-size: 16px; cursor: pointer; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>

    <h2 style="color: #f39c12;">PUBG SHOP</h2>

    <div class="grid">
        <!-- Вручную прописанные карточки для надежности -->
        <div class="card" onclick="pick(this, '60', 90)"><b>💎 60 UC</b><span>90₽</span></div>
        <div class="card" onclick="pick(this, '120', 170)"><b>💎 120 UC</b><span>170₽</span></div>
        <div class="card" onclick="pick(this, '325', 420)"><b>💎 325 UC</b><span>420₽</span></div>
        <div class="card" onclick="pick(this, '660', 810)"><b>💎 660 UC</b><span>810₽</span></div>
        <div class="card" onclick="pick(this, '1800', 2050)"><b>💎 1800 UC</b><span>2050₽</span></div>
        <div class="card" onclick="pick(this, '8100', 7900)"><b>💎 8100 UC</b><span>7900₽</span></div>
    </div>

    <div class="footer">
        <input type="number" id="p_id" placeholder="Ваш Player ID">
        <button id="main_btn" disabled>ОФОРМИТЬ ЗАКАЗ</button>
    </div>

    <script>
        // Инициализация
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let selectedItem = null;
        const btn = document.getElementById('main_btn');
        const inputId = document.getElementById('p_id');

        // Функция выбора карточки
        function pick(element, uc, price) {
            // Снимаем выделение со всех
            const allCards = document.querySelectorAll('.card');
            allCards.forEach(c => c.classList.remove('active'));
            
            // Выделяем текущую
            element.classList.add('active');
            
            // Сохраняем данные
            selectedItem = { uc: uc, price: price };
            
            check(); // Проверяем, можно ли активировать кнопку
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        // Проверка заполнения
        function check() {
            if (selectedItem && inputId.value.trim().length >= 5) {
                btn.disabled = false;
            } else {
                btn.disabled = True;
            }
        }

        // Слушаем ввод ID
        inputId.addEventListener('input', check);

        // Клик по кнопке "Оформить"
        btn.onclick = function() {
            const data = {
                amount: selectedItem.uc,
                price: selectedItem.price,
                player_id: inputId.value
            };
            // Отправляем данные боту (работает ТОЛЬКО если открыто в боте)
            tg.sendData(JSON.stringify(data));
        };
    </script>
</body>
</html>
