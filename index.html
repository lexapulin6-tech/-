<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>"></script>
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --accent: #f39c12;
            --text: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 15px;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header h2 { color: var(--accent); margin: 10px 0; text-transform: uppercase; }
        
        input {
            width: 100%; padding: 15px;
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 10px;
            color: white; font-size: 16px;
            box-sizing: border-box; margin-bottom: 20px;
        }
        input:focus { border-color: var(--accent); outline: none; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        .card {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
        }
        .card:active { transform: scale(0.98); background: #252525; }
        .uc-amount { font-size: 18px; font-weight: bold; color: var(--accent); display: block; }
        .price { font-size: 14px; opacity: 0.7; }
        .buy-btn {
            margin-top: 10px;
            background: var(--accent);
            color: #000; border: none;
            padding: 8px; width: 100%;
            border-radius: 6px; font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>PUBG UC STORE</h2>
    </div>

    <input type="number" id="player_id" placeholder="Введите ваш PUBG ID (цифры)">

    <div class="grid" id="container">
        <!-- Товары добавятся сюда автоматически через JS -->
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const prices = {
            "60": 90, "120": 170, "180": 250, "240": 325, "325": 420, "385": 490, 
            "445": 570, "660": 810, "720": 890, "985": 1200, "1320": 1600, 
            "1800": 2050, "1920": 2200, "2125": 2425, "2460": 2815, "3850": 3950, 
            "4510": 4750, "5650": 6000, "8100": 7900, "9900": 10000, "11950": 11850, 
            "16200": 15800, "24300": 23850, "32400": 31650, "40500": 39500, "81000": 77000
        };

        const container = document.getElementById('container');
        const idInput = document.getElementById('player_id');

        // Создаем карточки товаров
        Object.entries(prices).forEach(([uc, price]) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <span class="uc-amount">${uc} UC</span>
                <span class="price">${price}₽</span>
                <button class="buy-btn">ВЫБРАТЬ</button>
            `;
            
            card.onclick = () => {
                const pid = idInput.value.trim();
                if (pid.length < 5) {
                    alert("Сначала введите ваш PUBG ID!");
                    return;
                }

                // Формируем данные для отправки боту
                const orderData = JSON.stringify({
                    uc: uc,
                    price: price,
                    player_id: pid
                });

                tg.sendData(orderData); // Отправляем боту
                tg.close(); // Закрываем окно
            };
            container.appendChild(card);
        });
    </script>
</body>
</html>
