<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: sans-serif; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); padding: 15px; }
        .card { border: 1px solid #f39c12; padding: 10px; margin: 10px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .buy-btn { background: #f39c12; color: white; border: none; padding: 10px; border-radius: 5px; font-weight: bold; }
        h3 { margin-bottom: 5px; }
    </style>
</head>
<body>
    <h3>1. Введите PUBG ID:</h3>
    <input type="number" id="player_id" placeholder="Например: 5123456789">

    <h3>2. Выберите пакет:</h3>
    <div id="container"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const prices = {"60": 90, "120": 170, "660": 810, "1800": 2050}; // Сократил для примера

        const container = document.getElementById('container');
        const idInput = document.getElementById('player_id');

        Object.entries(prices).forEach(([uc, price]) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div><b>${uc} UC</b><br>${price}₽</div><button class="buy-btn">Выбрать</button>`;
            
            card.onclick = () => {
                const id = idInput.value;
                if (id.length < 5) {
                    alert("Сначала введите корректный PUBG ID!");
                    return;
                }
                // Отправляем сразу и UC, и ID
                tg.sendData(JSON.stringify({uc: uc, price: price, player_id: id}));
            };
            container.appendChild(card);
        });
    </script>
</body>
</html>
