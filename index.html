<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f1115; color: white; margin: 0; padding: 15px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-bottom: 180px; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; cursor: pointer; transition: 0.2s; }
        .card.active { border-color: #f39c12; background: rgba(243, 156, 18, 0.15); box-shadow: 0 0 15px rgba(243, 156, 18, 0.2); }
        .card b { display: block; font-size: 16px; margin-bottom: 5px; }
        .card b::before { content: "💎 "; }
        .card span { color: #f39c12; font-weight: bold; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: #16191f; padding: 20px; border-top: 1px solid #333; z-index: 1000; }
        input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; margin-bottom: 10px; box-sizing: border-box; text-align: center; font-size: 16px; outline: none; }
        button { width: 100%; padding: 16px; border-radius: 10px; border: none; background: #f39c12; color: #000; font-weight: bold; font-size: 16px; opacity: 0.3; text-transform: uppercase; }
    </style>
</head>
<body>
    <h2 style="color: #f39c12;">PUBG UC SHOP</h2>
    <div class="grid">
        <!-- Твой прайс -->
        <div class="card" onclick="selectItem(this, '60', '90')"><b>60 UC</b><span>90₽</span></div>
        <div class="card" onclick="selectItem(this, '120', '170')"><b>120 UC</b><span>170₽</span></div>
        <div class="card" onclick="selectItem(this, '325', '420')"><b>325 UC</b><span>420₽</span></div>
        <div class="card" onclick="selectItem(this, '660', '810')"><b>660 UC</b><span>810₽</span></div>
        <div class="card" onclick="selectItem(this, '1800', '2050')"><b>1800 UC</b><span>2050₽</span></div>
        <div class="card" onclick="selectItem(this, '8100', '7900')"><b>8100 UC</b><span>7900₽</span></div>
        <!-- Можешь добавить остальные по аналогии -->
    </div>
    <div class="footer">
        <input type="number" id="p_id" placeholder="Ваш Player ID">
        <button id="main_btn" disabled>Оформить заказ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let selectedData = null;
        const btn = document.getElementById('main_btn');
        const input = document.getElementById('p_id');

        function selectItem(el, uc, price) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            selectedData = { amount: uc, price: price };
            validate();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function validate() {
            if (selectedData && input.value.trim().length >= 5) {
                btn.disabled = false;
                btn.style.opacity = "1";
            } else {
                btn.disabled = true;
                btn.style.opacity = "0.3";
            }
        }

        input.addEventListener('input', validate);

        btn.onclick = function() {
            if (!selectedData || input.value.length < 5) return;
            const result = {
                amount: selectedData.amount,
                price: selectedData.price,
                player_id: input.value.trim()
            };
            tg.sendData(JSON.stringify(result));
            setTimeout(() => { tg.close(); }, 100);
        };
    </script>
</body>
</html>
